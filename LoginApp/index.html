<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — CSC426</title>
  <style>
    /* ---- RESET & BASE ---- */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      font-family: 'Segoe UI', sans-serif;
    }
    /* ---- CARD ---- */
    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }
    h1 { color: #fff; text-align: center; margin-bottom: 8px; }
    .subtitle { color: #aaa; text-align: center; font-size: 14px; margin-bottom: 28px; }
    /* ---- FORM FIELDS ---- */
    label { display: block; color: #ccc; font-size: 14px; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.07);
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border 0.2s;
    }
    input:focus { border-color: #e94560; }
    .field { margin-bottom: 20px; }
    /* ---- VALIDATION TEXT ---- */
    .error-text { color: #e94560; font-size: 12px; margin-top: 4px; display: none; }
    /* ---- BUTTONS ---- */
    .btn-row { display: flex; gap: 12px; margin-top: 8px; }
    button {
      flex: 1;
      padding: 13px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    #loginBtn { background: #e94560; color: #fff; }
    #resetBtn { background: rgba(255,255,255,0.1); color: #fff; }
    /* ---- MESSAGE BOX ---- */
    #message {
      display: none;
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
    }
    #message.success { background: #0d4f2e; color: #6fcf97; border: 1px solid #6fcf97; }
    #message.error   { background: #4f0d0d; color: #eb5757; border: 1px solid #eb5757; }
  </style>
</head>
<body>
  <div class='card'>
    <h1>Login</h1>
    <p class='subtitle'>Enter your Username and Password</p>

    <div class='field'>
      <label for='username'>Username</label>
      <input id='username' type='text' placeholder='Enter your username' />
      <p class='error-text' id='usernameErr'>Username is required.</p>
    </div>

    <div class='field'>
      <label for='password'>Password</label>
      <input id='password' type='password' placeholder='Enter your password' />
      <p class='error-text' id='passwordErr'>Password must be at least 6 characters.</p>
    </div>

    <div class='btn-row'>
      <button id='loginBtn' onclick='handleLogin()'>Login</button>
      <button id='resetBtn' onclick='handleReset()'>Reset</button>
    </div>

    <div id='message'></div>
  </div>

  <script>
    // Hardcoded demo credentials
    const VALID_USERNAME = 'admin';
    const VALID_PASSWORD = 'password123';

    function handleLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      let valid = true;

      // Reset previous errors
      document.getElementById('usernameErr').style.display = 'none';
      document.getElementById('passwordErr').style.display = 'none';

      // Validate username
      if (!username) {
        document.getElementById('usernameErr').style.display = 'block';
        valid = false;
      }

      // Validate password length
      if (password.length < 6) {
        document.getElementById('passwordErr').style.display = 'block';
        valid = false;
      }

      if (!valid) return;

      // Check credentials
      const msg = document.getElementById('message');
      if (username === VALID_USERNAME && password === VALID_PASSWORD) {
        msg.className = 'success';
        msg.textContent = 'Login successful! Welcome, ' + username + '.';
      } else {
        msg.className = 'error';
        msg.textContent = 'Invalid username or password. Please try again.';
      }
      msg.style.display = 'block';
    }

    function handleReset() {
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
      document.getElementById('usernameErr').style.display = 'none';
      document.getElementById('passwordErr').style.display = 'none';
      document.getElementById('message').style.display = 'none';
    }
  </script>
</body>
</html>
